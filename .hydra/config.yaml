model:
  type: random_forest
  n_estimators_min: 50
  n_estimators_max: 300
  max_depth_min: 3
  max_depth_max: 15
  min_samples_split_min: 2
  min_samples_split_max: 10
  min_samples_leaf_min: 1
  min_samples_leaf_max: 5
  class_weight: balanced
hpo:
  sampler: random
  n_trials: 20
  direction: maximize
  metric: f1
  seed: 42
data:
  prepared_dir: data/prepared
  target_col: Churn
  id_col: customerID
mlflow:
  tracking_uri: file:./mlruns
  experiment_name: Telco_Churn_Lab3
output:
  dir: models
